services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: henry-newapi-staging:local
    container_name: henry-newapi-staging
    restart: unless-stopped
    ports:
      - "127.0.0.1:13000:3000"
    volumes:
      - ./data-staging:/data
      - ./logs-staging:/app/logs
    environment:
      SQL_DSN: postgresql://root:${HENRY_STAGING_POSTGRES_PASSWORD:?HENRY_STAGING_POSTGRES_PASSWORD is required}@postgres:5432/new-api
      REDIS_CONN_STRING: redis://:${HENRY_STAGING_REDIS_PASSWORD:?HENRY_STAGING_REDIS_PASSWORD is required}@redis:6379
      TZ: ${HENRY_STAGING_TZ:-Asia/Shanghai}
      NODE_NAME: henry-66-staging

  redis:
    image: redis:7-alpine
    container_name: henry-redis-staging
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${HENRY_STAGING_REDIS_PASSWORD:?HENRY_STAGING_REDIS_PASSWORD is required}"]

  postgres:
    image: postgres:16-alpine
    container_name: henry-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${HENRY_STAGING_POSTGRES_PASSWORD:?HENRY_STAGING_POSTGRES_PASSWORD is required}
      POSTGRES_DB: new-api
    volumes:
      - henry_staging_pg_data:/var/lib/postgresql/data

volumes:
  henry_staging_pg_data:
