name: Release Dry Run

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-go@v6
        with:
          go-version: '>=1.25.1'

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build default frontend for release
        working-directory: web/default
        env:
          DISABLE_ESLINT_PLUGIN: "true"
          VITE_REACT_APP_VERSION: dry-run
        run: bun run build

      - name: Build classic frontend for release
        working-directory: web/classic
        env:
          VITE_REACT_APP_VERSION: dry-run
        run: bun run build

      - name: Build backend dry run
        run: |
          go mod download
          go build -ldflags "-s -w -X 'new-api/common.Version=dry-run'" -o new-api-dry-run
