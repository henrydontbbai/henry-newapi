name: Go CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.25.1"
          cache: true

      - name: Run focused Go tests
        run: go test ./relay/channel ./routingpolicy ./service -count=1
