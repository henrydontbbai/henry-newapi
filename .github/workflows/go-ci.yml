name: Go CI

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ">=1.25.1"
          cache: true

      - name: Run focused Go tests
        run: go test ./relay/channel ./routingpolicy ./service -count=1

      - name: Run routing middleware regression tests
        run: go test ./middleware -run 'SpecificChannel|AffinityChannel' -count=1

      - name: Run controller routing regression tests
        run: go test ./controller -run 'ShouldRetry|ValidateLockedTaskChannel' -count=1
